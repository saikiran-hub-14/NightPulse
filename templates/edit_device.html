<!DOCTYPE html>
<html>

<head>
<title>Edit Device</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h3>Edit Device</h3>

<form method="POST">

<div class="mb-3">

<label>Device Code</label>
<input type="text" class="form-control" value="{{device.device_code}}" disabled>

</div>

<div class="mb-3">

<label>Status</label>

<select name="status" class="form-control">

<option {% if device.status=="Active" %}selected{% endif %}>Active</option>
<option {% if device.status=="Charging" %}selected{% endif %}>Charging</option>
<option {% if device.status=="Offline" %}selected{% endif %}>Offline</option>

</select>

</div>

<div class="mb-3">

<label>Assigned Patient ID</label>

<input type="number" name="assigned_patient" class="form-control"
value="{{device.assigned_patient}}">

</div>

<button class="btn btn-success">Update Device</button>

</form>

</div>

</body>

</html>
