<!DOCTYPE html>
<html>

<head>

<title>NightPulse Alerts</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h3>Alert History</h3>

<table class="table table-bordered mt-3">

<tr>

<th>ID</th>
<th>Patient</th>
<th>Type</th>
<th>Level</th>
<th>Doctor Response</th>
<th>Escalated</th>
<th>Action</th>

</tr>

{% for alert in alerts %}

<tr>

<td>{{alert.id}}</td>
<td>{{alert.patient_id}}</td>
<td>{{alert.alert_type}}</td>
<td>{{alert.alert_level}}</td>
<td>{{alert.doctor_response}}</td>
<td>{{alert.escalation_status}}</td>

<td>

<a href="/resolve_alert/{{alert.id}}" class="btn btn-sm btn-success">
Acknowledge
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
