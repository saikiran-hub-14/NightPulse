<!DOCTYPE html>
<html>

<head>

<title>NightPulse | Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f7fb;
font-family:Segoe UI;
}

/* SIDEBAR */

.sidebar{
height:100vh;
background:#1f2d3d;
color:white;
padding:25px 15px;
position:fixed;
width:230px;
}

.sidebar h3{
color:#4dabf7;
margin-bottom:30px;
text-align:center;
}

.sidebar a{
display:block;
color:white;
padding:12px;
text-decoration:none;
border-radius:8px;
margin-bottom:10px;
transition:0.2s;
}

.sidebar a:hover{
background:#2f3e50;
padding-left:18px;
}

/* CONTENT */

.content{
margin-left:250px;
padding:30px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

/* STATUS DOT */

.status-dot{
height:10px;
width:10px;
background:#28c76f;
border-radius:50%;
display:inline-block;
margin-right:8px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.6);}
100%{transform:scale(1);}
}

/* CARDS */

.card{
border:none;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.stat-card{
text-align:center;
padding:25px;
}

.stat-card i{
font-size:32px;
margin-bottom:10px;
}

/* COLOR ACCENTS */

.patients{border-left:5px solid #4dabf7;}
.critical{border-left:5px solid #fa5252;}
.moderate{border-left:5px solid #fab005;}
.devices{border-left:5px solid #40c057;}
.alerts{border-left:5px solid #ff6b6b;}

</style>

</head>

<body>

<div class="sidebar">

<h3>NightPulse</h3>

<a href="/admin"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="/add_patient"><i class="bi bi-person-plus"></i> Add Patient</a>
<a href="/patients"><i class="bi bi-people"></i> Patients</a>
<a href="/devices"><i class="bi bi-cpu"></i> Devices</a>
<a href="/alerts"><i class="bi bi-bell"></i> Alerts</a>

</div>

<div class="content">

<div class="topbar">

<h4>
<span class="status-dot"></span>
Hospital Monitoring Dashboard
</h4>

<a href="/logout" class="btn btn-danger">
<i class="bi bi-box-arrow-right"></i> Logout
</a>

</div>

<div class="row">

<div class="col-md-3">

<div class="card stat-card patients">

<i class="bi bi-people text-primary"></i>

<h6>Total Patients</h6>

<h2>{{total_patients}}</h2>

</div>

</div>

<div class="col-md-3">

<div class="card stat-card critical">

<i class="bi bi-heart-pulse text-danger"></i>

<h6>Critical Patients</h6>

<h2>{{critical_patients}}</h2>

</div>

</div>

<div class="col-md-3">

<div class="card stat-card moderate">

<i class="bi bi-exclamation-triangle text-warning"></i>

<h6>Moderate Patients</h6>

<h2>{{moderate_patients}}</h2>

</div>

</div>

<div class="col-md-3">

<div class="card stat-card devices">

<i class="bi bi-cpu text-success"></i>

<h6>Active Devices</h6>

<h2>{{total_devices}}</h2>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-4">

<div class="card stat-card alerts">

<i class="bi bi-bell text-danger"></i>

<h6>Active Alerts</h6>

<h2>{{active_alerts}}</h2>

</div>

</div>

</div>

</div>

</body>

</html>
